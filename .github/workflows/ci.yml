name: CI

on:
  push:
    branches: [main, develop]  
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          LLM_MODEL: "llama-3.3-70b-versatile"
          EMBEDDINGS_MODEL_PATH: "models/bge-small-en-v1.5"
          JSON_FILE_PATH: "data/trial_data.json"
          DB_PATH: "data/trial_data.db"
          INDEX_PATH: "data/faiss_index"
          LOG_DB_PATH: "data/eval_data.db"
          VECTOR_K: 3
          OMP_NUM_THREADS: 1
          MKL_NUM_THREADS: 1
          OPENBLAS_NUM_THREADS: 1
          VECLIB_MAXIMUM_THREADS: 1
          BASE_URL: "https://clinicaltrials.gov/api/v2/studies"
          MAX_STUDIES: 586000
        run: python -m pytest tests/ -v --tb=short

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-1
      - name: Build and push Docker image
        run: |
          aws ecr get-login-password --region us-west-1 | docker login --username AWS --password-stdin ${{ secrets.ECR_URI }}
          docker build -t multihop-clinical-rag .
          docker tag multihop-clinical-rag:latest ${{ secrets.ECR_URI }}:latest
          docker push ${{ secrets.ECR_URI }}:latest 
